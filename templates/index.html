<!DOCTYPE html>
<html lang="en">
<head>
    <title>Steam Tracker — Sign In</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
    <link rel="icon" href="https://upload.wikimedia.org/wikipedia/commons/8/83/Steam_icon_logo.svg" type="image/svg+xml">
</head>
<body>
    <div class="login-wrap">
        <div class="login-card">
            <img src="https://upload.wikimedia.org/wikipedia/commons/8/83/Steam_icon_logo.svg"
                alt="Steam" class="login-logo">
            <h1 class="login-title">Steam Tracker</h1>
            <p class="login-sub">Enter your Steam ID to view your achievement dashboard.</p>

            {% if error %}
            <div class="login-error">{{ error }}</div>
            {% endif %}

            <form action="/login" method="post" class="login-form">
                <input
                    type="text"
                    name="steam_id"
                    class="login-input"
                    placeholder="76561198xxxxxxxxx"
                    pattern="\d{17}"
                    title="Must be a 17-digit Steam ID"
                    required
                    autofocus>
                <button type="submit" class="login-btn">View Dashboard</button>
            </form>

            <p class="login-hint">
                Find your Steam ID: open Steam → your profile → the URL shows
                <code>steamcommunity.com/profiles/<strong>XXXXXXXXXXXXXXXXX</strong></code>
            </p>
        </div>
    </div>

</body>
</html>
